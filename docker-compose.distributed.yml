services:
  redis:
    image: ${REDIS_IMAGE:-public.ecr.aws/docker/library/redis:7-alpine}
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  etcd:
    image: quay.io/coreos/etcd:v3.5.15
    command:
      - /usr/local/bin/etcd
      - --name=etcd
      - --data-dir=/etcd-data
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --initial-advertise-peer-urls=http://etcd:2380
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-cluster=etcd=http://etcd:2380
      - --initial-cluster-token=searcrawl-etcd
      - --initial-cluster-state=new
    ports:
      - "2379:2379"
    volumes:
      - etcd_data:/etcd-data
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  searxng:
    image: ${SEARXNG_IMAGE:-ghcr.io/searxng/searxng:latest}
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      SEARXNG_BASE_URL: http://localhost:8080/
      SEARXNG_SECRET: ${SEARXNG_SECRET:-ultrasecretkey}
    restart: unless-stopped

  reader-1:
    image: ${READER_IMAGE:-ghcr.io/intergalacticalvariable/reader:latest}
    volumes:
      - reader_1_data:/app/local-storage
    expose:
      - "3000"
    restart: unless-stopped

  reader-2:
    image: ${READER_IMAGE:-ghcr.io/intergalacticalvariable/reader:latest}
    volumes:
      - reader_2_data:/app/local-storage
    expose:
      - "3000"
    restart: unless-stopped

  app:
    build:
      context: .
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-mcr.microsoft.com/devcontainers/python:1-3.11-bookworm}
    ports:
      - "8000:3000"
    volumes:
      - app_index:/app/data
    env_file:
      - .env
    environment: &distributed-env
      REDIS_URL: redis://redis:6379/0
      SEARXNG_URL: http://searxng:8080
      SEARCH_PROVIDER: router
      LOCAL_INDEX_ENABLED: "true"
      LOCAL_INDEX_PATH: /app/data/searcrawl.sqlite3
      BACKFILL_ENABLED: "true"
      BACKFILL_QUEUE_BACKEND: redis
      BACKFILL_REDIS_KEY_PREFIX: searcrawl:backfill
      BACKFILL_CLAIM_TTL_SECONDS: "900"
      READER_ENABLED: "true"
      READER_URLS: http://reader-1:3000,http://reader-2:3000
      CRAWL_EXTRACTION_STRATEGY: reader_first
      BROWSER_BACKEND: ${BROWSER_BACKEND:-local}
      ETCD_ENABLED: "true"
      ETCD_ENDPOINTS: http://etcd:2379
      ETCD_NAMESPACE: searcrawl
      ETCD_DISCOVER_READERS: "true"
      ETCD_REGISTER_SELF: "true"
      ETCD_REGISTER_READER_URLS: "true"
      ETCD_SELF_SERVICES: api,crawler
      ETCD_NODE_ID: app
      ETCD_NODE_ENDPOINT: http://app:3000
    depends_on:
      redis:
        condition: service_healthy
      etcd:
        condition: service_healthy
      searxng:
        condition: service_started
      reader-1:
        condition: service_started
      reader-2:
        condition: service_started
    restart: unless-stopped

  crawler-worker-1:
    build:
      context: .
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-mcr.microsoft.com/devcontainers/python:1-3.11-bookworm}
    volumes:
      - crawler_1_index:/app/data
    env_file:
      - .env
    environment:
      <<: *distributed-env
      ETCD_SELF_SERVICES: crawler
      ETCD_NODE_ID: crawler-worker-1
      ETCD_NODE_ENDPOINT: http://crawler-worker-1:3000
    depends_on:
      redis:
        condition: service_healthy
      etcd:
        condition: service_healthy
      reader-1:
        condition: service_started
      reader-2:
        condition: service_started
    restart: unless-stopped

  crawler-worker-2:
    build:
      context: .
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-mcr.microsoft.com/devcontainers/python:1-3.11-bookworm}
    volumes:
      - crawler_2_index:/app/data
    env_file:
      - .env
    environment:
      <<: *distributed-env
      ETCD_SELF_SERVICES: crawler
      ETCD_NODE_ID: crawler-worker-2
      ETCD_NODE_ENDPOINT: http://crawler-worker-2:3000
    depends_on:
      redis:
        condition: service_healthy
      etcd:
        condition: service_healthy
      reader-1:
        condition: service_started
      reader-2:
        condition: service_started
    restart: unless-stopped

volumes:
  redis_data:
  etcd_data:
  reader_1_data:
  reader_2_data:
  app_index:
  crawler_1_index:
  crawler_2_index:
